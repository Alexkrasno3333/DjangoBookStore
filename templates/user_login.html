{% extends "base.html" %}

{% block title %}Войти{% endblock %}

{% block content %}

<main class="container auth-page">
    <div class="auth-card">
        <h1>Войти</h1>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn auth-submit-btn">
                Войти
            </button>
            <p class="mt-3">
    Нет аккаунта?
    <a href="{% url 'users:register' %}">Зарегистрироваться</a>
</p>
        </form>
    </div>
</main>

{% endblock %}
