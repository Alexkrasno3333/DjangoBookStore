{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}

<main class="container auth-page">
    <div class="auth-card">
        <h1>Регистрация</h1>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn auth-submit-btn">
                Зарегистрироваться
            </button>
        </form>

        <p class="mt-3">
            Уже есть аккаунт?
            <a href="{% url 'users:login' %}">Войти</a>
        </p>
    </div>
</main>

{% endblock %}
